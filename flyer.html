<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gippslander PDF Flyer Generator</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary-color: #4CAF50;
            --text-main: #1a1a1a;
            --bg-color: #f4f7f6;
            --font-main: 'Poppins', sans-serif;
        }

        body { font-family: var(--font-main); background-color: var(--bg-color); margin: 0; padding: 40px 20px; color: var(--text-main); }
        
        /* --- DASHBOARD UI --- */
        .dashboard { max-width: 900px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .dash-header img { height: 40px; object-fit: contain; }
        .dash-header span { font-weight: 600; color: #666; background: #eee; padding: 5px 12px; border-radius: 20px; font-size: 0.9rem;}
        
        .controls { display: flex; gap: 15px; margin-bottom: 15px; }
        input[type="text"] { flex: 1; padding: 12px 20px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; font-family: inherit; outline: none; transition: border-color 0.2s;}
        input[type="text"]:focus { border-color: var(--primary-color); }
        
        button { background: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        button:hover { background: #388E3C; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* --- LIST HEADER --- */
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .list-header h3 { margin: 0; font-size: 1.1rem; color: #444; }
        .btn-select-all { background: transparent; color: #0d47a1; border: 1px solid #0d47a1; padding: 6px 12px; font-size: 0.85rem; border-radius: 6px; }
        .btn-select-all:hover { background: #e3f2fd; }

        .job-list { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 15px; border-radius: 8px; background: #fafafa; }
        .job-item { display: flex; align-items: center; gap: 15px; padding: 12px 15px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); border: 2px solid transparent; border-left: 4px solid #ddd; transition: 0.1s;}
        .job-item:hover { border-color: #eee; border-left-color: #aaa; transform: translateX(2px);}
        
        .job-item.selected-item { border-left: 4px solid var(--primary-color); background: #f0fdf4; border-top: 2px solid #c6f6d5; border-right: 2px solid #c6f6d5; border-bottom: 2px solid #c6f6d5;}
        .job-item input { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary-color);}
        
        /* --- ACTION & ADMIN CONTROLS --- */
        .admin-options { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid #bbdefb; display: flex; align-items: center; justify-content: center; gap: 20px; font-weight: 600; color: #0d47a1; flex-wrap: wrap;}
        .admin-options label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.95rem; }
        .admin-options input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #0d47a1; }
        
        .action-row { display: flex; gap: 15px; margin-top: 15px; }
        .btn-generate { flex: 1; background: #0d47a1; font-size: 1.2rem; padding: 15px; box-shadow: 0 4px 15px rgba(13, 71, 161, 0.2);}
        .btn-generate:hover { background: #002171; box-shadow: 0 6px 20px rgba(13, 71, 161, 0.3);}
        .btn-clear { background: #e53935; font-size: 1.1rem; padding: 15px 25px; display: none; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer;}
        .btn-clear:hover { background: #c62828; }

        /* --- HIDDEN PDF TEMPLATE --- */
        #pdf-wrapper { position: absolute; left: -9999px; top: 0; }
        
        #pdf-template { width: 800px; background: white; padding: 40px; box-sizing: border-box; color: #000; }
        #pdf-template * { font-family: 'Poppins', sans-serif !important; }
        
        .pdf-header { text-align: center; margin-bottom: 25px; border-bottom: 3px solid var(--primary-color); padding-bottom: 15px; position: relative;}
        .pdf-header img { height: 45px; object-fit: contain; margin-bottom: 8px; }
        .pdf-header h1 { margin: 0; font-size: 30px; font-weight: 800; color: #1a1a1a; line-height: 1.2;}
        .pdf-edition-bar { font-size: 14px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px;}
        #pdf-featured-locations { font-size: 13px; color: var(--primary-color); font-weight: 700; margin: 8px 0 0 0; display: block; line-height: 1.4;}

        .pdf-grid { display: block; width: 100%; }
        
        .pdf-hard-break { page-break-before: always !important; display: block; width: 100%; height: 40px; background: transparent;}

        .pdf-card { 
            display: block; width: 100%; box-sizing: border-box; 
            border: 2px solid #ddd; border-radius: 12px; background: #fff; 
            margin: 0 0 12px 0; page-break-inside: avoid !important; overflow: hidden;
        }

        .pdf-card-inner { display: table; width: 100%; padding: 14px 20px; box-sizing: border-box; table-layout: fixed; }
        .pdf-card-main { display: table-cell; width: 65%; vertical-align: middle; padding-right: 25px; word-wrap: break-word; }
        .pdf-qr-section { display: table-cell; width: 35%; vertical-align: middle; border-left: 2px dashed #eee; padding-left: 15px; text-align: center; }

        .pdf-category { display: block; font-size: 12px; color: var(--primary-color); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;}
        
        .pdf-title { 
            font-size: 18px; font-weight: 800; margin: 0 0 4px 0; line-height: 1.2; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        
        .pdf-company { font-size: 14px; font-weight: 600; color: #444; margin: 0 0 4px 0; }
        .pdf-location { font-size: 13px; color: #666; margin: 0 0 6px 0; display: block; }
        
        /* Badges */
        .pdf-badges { margin-bottom: 8px; }
        .badge-pill { display: inline-block; font-size: 9.5px; font-weight: 700; padding: 3px 6px; border-radius: 4px; margin-right: 6px; vertical-align: middle;}
        .badge-fresh { background: #e8f5e9; color: #2e7d32; }
        .badge-urgent { background: #ffebee; color: #c62828; }

        .pdf-desc { 
            font-size: 12px; color: #555; line-height: 1.4; margin-bottom: 0; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        
        .pdf-qr-img { margin: 0 auto 6px auto; width: 75px; height: 75px; }
        .pdf-qr-text { font-size: 12px; font-weight: 700; color: var(--primary-color); text-align: center; display: block; margin-bottom: 6px;}
        
        .pdf-qr-sub { 
            display: inline-block; font-size: 10.5px; color: #1a1a1a; font-weight: 800; 
            text-align: center; background: #f0f0f0; padding: 6px 8px; border-radius: 6px; 
            letter-spacing: 0px; white-space: nowrap; max-width: 100%; box-sizing: border-box; overflow: hidden; text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="dash-header">
            <img src="" id="main-dash-logo" alt="Gippslander Logo">
            <span id="status-text">System Loading...</span>
        </div>
        
        <div class="controls">
            <input type="text" id="flyer-title-input" placeholder="Edition Name (e.g., South Gippsland Jobs)" value="Local Job Opportunities">
        </div>

        <div class="list-header" id="list-header-controls" style="display: none;">
            <h3>Select Towns to Include:</h3>
            <button class="btn-select-all" id="btn-select-all" onclick="toggleSelectAll()">Select All Towns</button>
        </div>

        <div class="job-list" id="job-list-container">
            <div style="padding: 30px; text-align: center; color: #888; font-size: 1.1rem;">Fetching latest jobs...</div>
        </div>

        <div class="admin-options">
            <label><input type="checkbox" id="featured-filter" onchange="updateButtonState()"> Featured / Premium Jobs Only</label>
            <span style="color: #bbdefb;">|</span>
            <label><input type="checkbox" id="include-insights" checked> + Insights Card</label>
            <label><input type="checkbox" id="include-courses" checked> + Courses Card</label>
            <label><input type="checkbox" id="include-alerts" checked> + Alerts Card</label>
        </div>

        <div class="action-row">
            <button class="btn-generate" id="generate-btn" onclick="generatePDF()" disabled>Download PDF Flyer (0 jobs)</button>
            <button class="btn-clear" id="clear-btn" onclick="clearSelection()">Clear Selection</button>
        </div>
    </div>

    <div id="pdf-wrapper">
        <div id="pdf-template">
            <div class="pdf-header">
                <img id="pdf-safe-logo" src="" alt="Gippslander Logo">
                <h1 id="pdf-title-town">Local Job Opportunities</h1>
                <div class="pdf-edition-bar" id="pdf-date-line"></div>
                <span id="pdf-featured-locations"></span>
            </div>
            
            <div class="pdf-grid" id="pdf-grid-container"></div>
        </div>
    </div>

    <script>
        const BASE_API_URL = 'https://gippsland-jobs-proxy.vercel.app/api/jobs'; // Removed towns= query to fetch all
        const LOGO_URL = 'https://raw.githubusercontent.com/gippslander/assets/main/gippslander_com_au_logo.png';
        
        // --- SVG Icons (Star Removed) ---
        const PIN_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#d32f2f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-bottom: 2px; margin-right: 4px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>`;
        const BOOK_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0d47a1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-bottom: 2px;"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>`;
        const LAPTOP_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-bottom: 2px; margin-right: 4px;"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>`;
        const BELL_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f57f17" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-bottom: 2px;"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>`;
        const CHART_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-bottom: 2px;"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>`;
        const CLOCK_SVG = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-bottom: 2px; margin-right: 2px;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;
        const ALERT_SVG = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-bottom: 2px; margin-right: 2px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;

        let fetchedJobs = []; 
        let uniqueTowns = [];
        let selectedTowns = new Set();
        let cachedLogoBase64 = null; 

        window.onload = () => {
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                cachedLogoBase64 = canvas.toDataURL('image/png');
                
                document.getElementById('main-dash-logo').src = cachedLogoBase64;
                document.getElementById('pdf-safe-logo').src = cachedLogoBase64;
            };
            img.src = LOGO_URL;

            // Instantly fetch jobs on load
            fetchJobs();
        };

        // --- UTM Tracker ---
        function buildTrackingUrl(baseLink, campaign) {
            try {
                const url = new URL(baseLink);
                url.searchParams.set('utm_source', 'job_flyer');
                const safeCampaign = (campaign || 'default').replace(/\s+/g, '_');
                url.searchParams.set('utm_campaign', safeCampaign);
                return url.toString();
            } catch(e) { return baseLink; }
        }

        function drawQR(elementId, url) {
            const container = document.getElementById(elementId);
            if (!container) return;
            container.innerHTML = ''; 
            
            const qrWrapper = document.createElement('div');
            qrWrapper.className = 'pdf-qr-img';
            container.appendChild(qrWrapper);

            new QRCode(qrWrapper, {
                text: url, width: 75, height: 75,
                colorDark : "#1a1a1a", colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M
            });
        }

        function getTownString(job) {
            return (job.location || '').replace(/,\s*Victoria,\s*Australia/i, '').trim();
        }

        async function fetchJobs() {
            const container = document.getElementById('job-list-container');
            const status = document.getElementById('status-text');

            try {
                const response = await fetch(BASE_API_URL);
                const data = await response.json();
                
                fetchedJobs = data.filter(j => j.title && j.final_status === 'active');
                
                if (fetchedJobs.length === 0) {
                    container.innerHTML = `<div style="padding: 30px; text-align: center; color: #ff3b30; font-weight: 600;">No active jobs found.</div>`;
                    status.innerText = "0 Results";
                } else {
                    status.innerText = `System Ready`;
                    processTowns();
                }
            } catch (error) {
                container.innerHTML = `<div style="padding: 30px; text-align: center; color: #ff3b30; font-weight: 600;">Failed to fetch jobs. Check internet connection.</div>`;
                status.innerText = "Network Error";
            }
        }

        function processTowns() {
            const townCounts = {};
            fetchedJobs.forEach(job => {
                const t = getTownString(job);
                if (!t) return;
                townCounts[t] = (townCounts[t] || 0) + 1;
            });

            uniqueTowns = Object.keys(townCounts).sort();
            
            const container = document.getElementById('job-list-container');
            container.innerHTML = '';

            uniqueTowns.forEach(town => {
                const safeId = town.replace(/[^a-zA-Z0-9]/g, '-');
                const div = document.createElement('div');
                div.className = 'job-item';
                div.innerHTML = `
                    <input type="checkbox" id="town-check-${safeId}" value="${town}">
                    <label class="job-info" for="town-check-${safeId}" style="flex-direction: row; justify-content: space-between; align-items: center; cursor: pointer; display: flex; width: 100%;">
                        <span style="font-weight: 600; font-size: 1.05rem;">${town}</span>
                        <span style="font-size: 0.85rem; color: #666; background: #eee; padding: 4px 12px; border-radius: 12px;">${townCounts[town]} jobs</span>
                    </label>
                `;

                const checkbox = div.querySelector('input');
                checkbox.addEventListener('change', (e) => {
                    if(e.target.checked) {
                        selectedTowns.add(town);
                        div.classList.add('selected-item');
                    } else {
                        selectedTowns.delete(town);
                        div.classList.remove('selected-item');
                    }
                    updateButtonState();
                    updateSelectAllButtonText();
                });

                container.appendChild(div);
            });

            document.getElementById('list-header-controls').style.display = 'flex';
            updateButtonState();
        }

        function getFinalSelectedJobs() {
            const includeFeaturedOnly = document.getElementById('featured-filter').checked;
            
            return fetchedJobs.filter(job => {
                const town = getTownString(job);
                if (!selectedTowns.has(town)) return false;
                if (includeFeaturedOnly && !job.featured && !job.pin_to_top) return false;
                return true;
            });
        }

        function updateButtonState() {
            const finalJobs = getFinalSelectedJobs();
            const genBtn = document.getElementById('generate-btn');
            const clearBtn = document.getElementById('clear-btn');
            
            genBtn.innerText = `Download PDF Flyer (${finalJobs.length} jobs)`;
            genBtn.disabled = finalJobs.length === 0;
            clearBtn.style.display = selectedTowns.size > 0 ? 'block' : 'none';
        }

        function clearSelection() {
            selectedTowns.clear();
            document.querySelectorAll('.job-list input[type="checkbox"]').forEach(cb => {
                cb.checked = false;
                cb.closest('.job-item').classList.remove('selected-item');
            });
            updateButtonState();
            updateSelectAllButtonText();
        }

        function toggleSelectAll() {
            const allSelected = selectedTowns.size === uniqueTowns.length;
            
            if (allSelected) {
                selectedTowns.clear();
            } else {
                uniqueTowns.forEach(t => selectedTowns.add(t));
            }
            
            document.querySelectorAll('.job-list input[type="checkbox"]').forEach(cb => {
                cb.checked = !allSelected;
                if (!allSelected) {
                    cb.closest('.job-item').classList.add('selected-item');
                } else {
                    cb.closest('.job-item').classList.remove('selected-item');
                }
            });
            
            updateButtonState();
            updateSelectAllButtonText();
        }

        function updateSelectAllButtonText() {
            const btn = document.getElementById('btn-select-all');
            const allSelected = selectedTowns.size === uniqueTowns.length && uniqueTowns.length > 0;
            btn.innerText = allSelected ? "Deselect All Towns" : "Select All Towns";
        }

        function generatePDF() {
            const genBtn = document.getElementById('generate-btn');
            const currentText = genBtn.innerText;
            genBtn.innerText = "Generating PDF... Please wait";
            genBtn.disabled = true;

            const selectedJobs = getFinalSelectedJobs();
            if (selectedJobs.length === 0) {
                genBtn.innerText = currentText;
                return;
            }

            const includeInsights = document.getElementById('include-insights').checked;
            const includeCourses = document.getElementById('include-courses').checked;
            const includeAlerts = document.getElementById('include-alerts').checked;

            const customTitle = document.getElementById('flyer-title-input').value.trim() || 'Local Job Opportunities';
            document.getElementById('pdf-title-town').innerText = customTitle;

            const dateStr = new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('pdf-date-line').innerText = dateStr;

            const uniqueSelectedTowns = Array.from(selectedTowns);
            const townsString = uniqueSelectedTowns.length > 0 ? `Featuring roles in: ${uniqueSelectedTowns.join(', ')}` : '';
            document.getElementById('pdf-featured-locations').innerText = townsString;

            const grid = document.getElementById('pdf-grid-container');
            let allCards = [];

            const now = new Date();

            // 1. Build Base Job Cards
            selectedJobs.forEach((job) => {
                const category = job.category?.name || 'General';
                const employer = job.employer?.name || 'Local Employer';
                const location = getTownString(job);
                
                let cleanDesc = (job.description || '').replace(/<[^>]*>/g, ' ').replace(/\s\s+/g, ' ').trim();
                const shortDesc = cleanDesc.length > 130 ? cleanDesc.substring(0, 130) + '...' : cleanDesc;
                const isFeat = job.featured || job.pin_to_top;

                let badgesHtml = '';
                const postedDate = new Date(job.posted_at || job.created_at);
                const diffDays = Math.ceil(Math.abs(now - postedDate) / (1000 * 60 * 60 * 24));
                if (diffDays <= 7) {
                    badgesHtml += `<span class="badge-pill badge-fresh">${CLOCK_SVG} Recently Listed</span>`;
                }

                const expiresDays = job.job_expires_in_days || 30;
                const expiryDate = new Date(postedDate.getTime() + (expiresDays * 24 * 60 * 60 * 1000));
                const daysToExpiry = Math.ceil((expiryDate - now) / (1000 * 60 * 60 * 24));
                if (daysToExpiry > 0 && daysToExpiry <= 7) {
                    badgesHtml += `<span class="badge-pill badge-urgent">${ALERT_SVG} Closing Soon</span>`;
                }
                
                allCards.push(`
                    <div class="pdf-card" ${isFeat ? 'style="border-color: var(--primary-color);"' : ''}>
                        <div class="pdf-card-inner">
                            <div class="pdf-card-main">
                                <span class="pdf-category">
                                    ${category}
                                </span>
                                <h2 class="pdf-title">${job.title}</h2>
                                <p class="pdf-company">${employer}</p>
                                <span class="pdf-location">${PIN_SVG} ${location}</span>
                                ${badgesHtml ? `<div class="pdf-badges">${badgesHtml}</div>` : ''}
                                <p class="pdf-desc">${shortDesc}</p>
                            </div>
                            <div class="pdf-qr-section">
                                <div id="pdf-qr-job-${job.id}"></div>
                                <span class="pdf-qr-text">Scan to Apply →</span>
                                <span class="pdf-qr-sub">gippslander.au/${job.id}</span>
                            </div>
                        </div>
                    </div>
                `);
            });

            // 2. Prepare Special Cards HTML
            let specialCardsToInject = [];

            if (includeInsights && selectedJobs.length > 0) {
                let locationDemand = {};
                selectedJobs.forEach(job => {
                    const loc = getTownString(job);
                    const views = job.statistics?.views_count || 1; 
                    if (!locationDemand[loc]) locationDemand[loc] = 0;
                    locationDemand[loc] += views;
                });

                let demandArray = Object.keys(locationDemand).map(loc => ({ loc, views: locationDemand[loc] }));
                demandArray.sort((a, b) => b.views - a.views);
                let topDemand = demandArray.slice(0, 3); 
                const maxViews = topDemand.length > 0 ? topDemand[0].views : 1;

                let barsHtml = '';
                topDemand.forEach(item => {
                    const percentage = Math.max(15, (item.views / maxViews) * 100); 
                    let label = percentage > 75 ? 'Very High Demand' : (percentage > 40 ? 'High Demand' : 'Moderate Demand');
                    
                    barsHtml += `
                        <div style="margin-bottom: 8px;">
                            <div style="display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; color: #444; margin-bottom: 3px;">
                                <span>${item.loc}</span>
                                <span style="color: #888; font-size: 10px;">${label}</span>
                            </div>
                            <div style="background: #e0e0e0; height: 6px; border-radius: 3px; width: 100%; overflow: hidden;">
                                <div style="background: var(--primary-color); height: 100%; width: ${percentage}%; border-radius: 3px;"></div>
                            </div>
                        </div>
                    `;
                });

                specialCardsToInject.push(`
                    <div class="pdf-card">
                        <div class="pdf-card-inner">
                            <div class="pdf-card-main">
                                <span class="pdf-category" style="color: #444;">
                                    LOCAL MARKET INSIGHTS
                                    <span style="float: right;">${CHART_SVG}</span>
                                </span>
                                <h2 class="pdf-title">Employer Demand by Town</h2>
                                <p class="pdf-desc" style="margin-bottom: 12px; font-style: italic;">Based on recent activity, these locations currently have the highest job seeker demand.</p>
                                ${barsHtml}
                            </div>
                            <div class="pdf-qr-section">
                                <div style="margin: 0 auto 12px auto; width: 60px; height: 60px; background: #f0f0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                                </div>
                                <span style="font-size: 12px; font-weight: 700; color: #444; text-align: center; display: block; margin-bottom: 6px;">Data Refreshed</span>
                                <span style="display: block; font-size: 11px; color: #1a1a1a; font-weight: 800; text-align: center; background: #e0e0e0; padding: 6px 8px; border-radius: 6px; white-space: nowrap; width: 100%; box-sizing: border-box;">${dateStr}</span>
                            </div>
                        </div>
                    </div>
                `);
            }

            if (includeCourses) {
                specialCardsToInject.push(`
                    <div class="pdf-card" style="border-color: #0d47a1; background: #f4f8ff;">
                        <div class="pdf-card-inner">
                            <div class="pdf-card-main">
                                <span class="pdf-category" style="color: #0d47a1;">
                                    Level Up Your Skills
                                    <span style="float: right;">${BOOK_SVG}</span>
                                </span>
                                <h2 class="pdf-title">Accredited Online Courses</h2>
                                <p class="pdf-company">Gippslander</p>
                                <span class="pdf-location">${LAPTOP_SVG} 100% Online</span>
                                <p class="pdf-desc">Give your resume the edge! Courses include Victorian RSA, Barista Essentials, Food Safety, Customer Service Training and more. Fully accredited.</p>
                            </div>
                            <div class="pdf-qr-section" style="border-left-color: #bbdefb;">
                                <div id="pdf-qr-courses"></div>
                                <span class="pdf-qr-text" style="color: #0d47a1;">Scan to Enroll →</span>
                                <span class="pdf-qr-sub">gippslander.au/courses</span>
                            </div>
                        </div>
                    </div>
                `);
            }

            if (includeAlerts) {
                specialCardsToInject.push(`
                    <div class="pdf-card" style="border-color: #f57f17; background: #fffde7;">
                        <div class="pdf-card-inner">
                            <div class="pdf-card-main">
                                <span class="pdf-category" style="color: #e65100;">
                                    Never Miss A Job
                                    <span style="float: right;">${BELL_SVG}</span>
                                </span>
                                <h2 class="pdf-title">Get Local Job Alerts</h2>
                                <p class="pdf-company">Gippslander</p>
                                <span class="pdf-location">${PIN_SVG} Sent straight to your inbox</span>
                                <p class="pdf-desc">Want more local jobs? Scan the code or visit the link to get customized email alerts for your specific town and industry as soon as jobs are posted.</p>
                            </div>
                            <div class="pdf-qr-section" style="border-left-color: #ffe082;">
                                <div id="pdf-qr-alerts"></div>
                                <span class="pdf-qr-text" style="color: #e65100;">Scan to Subscribe →</span>
                                <span class="pdf-qr-sub">gippslander.au/alerts</span>
                            </div>
                        </div>
                    </div>
                `);
            }

            // Distribute Special Cards Safely
            const targetIndices = [2, 6, 10];
            specialCardsToInject.forEach((cardHtml, index) => {
                let targetIdx = targetIndices[index];
                if (allCards.length >= targetIdx) {
                    allCards.splice(targetIdx, 0, cardHtml);
                } else {
                    allCards.push(cardHtml);
                }
            });

            // 3. The Catch-All Card
            const finalCard = `
                <div class="pdf-card" style="border-color: #4CAF50; background: #f0fdf4;">
                    <div class="pdf-card-inner">
                        <div class="pdf-card-main">
                            <span class="pdf-category" style="color: #4CAF50;">
                                More Opportunities
                                <span style="float: right;">🔍</span>
                            </span>
                            <h2 class="pdf-title">Find These Jobs & Many More</h2>
                            <p class="pdf-company">Gippslander</p>
                            <span class="pdf-location">${PIN_SVG} Gippsland Wide</span>
                            <p class="pdf-desc">Didn't find the perfect fit? We have hundreds of local roles added weekly. Scan the code or visit the link to explore all available jobs across the region.</p>
                        </div>
                        <div class="pdf-qr-section" style="border-left-color: #c6f6d5;">
                            <div id="pdf-qr-final"></div>
                            <span class="pdf-qr-text" style="color: #4CAF50;">Scan to Explore →</span>
                            <span class="pdf-qr-sub">gippslander.com.au</span>
                        </div>
                    </div>
                </div>
            `;
            allCards.push(finalCard);

            // 4. HARD PAGINATION LOGIC
            let paginatedHTML = '';
            
            let page1Cards = allCards.slice(0, 3);
            paginatedHTML += `<div>${page1Cards.join('')}</div>`;
            
            let remainingCards = allCards.slice(3);
            for (let i = 0; i < remainingCards.length; i += 4) {
                let chunk = remainingCards.slice(i, i + 4);
                paginatedHTML += `<div class="pdf-hard-break"></div>`; 
                paginatedHTML += `<div>${chunk.join('')}</div>`;
            }

            grid.innerHTML = paginatedHTML;

            // 5. Draw QR Codes and Capture PDF
            setTimeout(() => {
                
                selectedJobs.forEach((job) => {
                    const fullUrl = job.job_details_url || `https://gippslander.com.au/jobs/${job.id}`;
                    drawQR(`pdf-qr-job-${job.id}`, buildTrackingUrl(fullUrl, customTitle));
                });
                
                if (includeCourses) drawQR('pdf-qr-courses', buildTrackingUrl('https://gippslander.com.au/courses', customTitle));
                if (includeAlerts) drawQR('pdf-qr-alerts', buildTrackingUrl('https://gippslander.com.au/alerts', customTitle));
                drawQR('pdf-qr-final', buildTrackingUrl('https://gippslander.com.au', customTitle));

                const element = document.getElementById('pdf-template');
                
                const opt = {
                    margin:       [25, 0, 15, 0], 
                    filename:     `Gippslander-Jobs-${new Date().toISOString().slice(0,10)}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true, scrollY: 0, scrollX: 0 }, 
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak:    { mode: ['css', 'legacy'], avoid: ['.pdf-card', '.pdf-header'] } 
                };

                html2pdf().set(opt).from(element).toPdf().get('pdf').then(function (pdf) {
                    const totalPages = pdf.internal.getNumberOfPages();
                    const pageWidth = pdf.internal.pageSize.getWidth();
                    const pageHeight = pdf.internal.pageSize.getHeight();

                    for (let i = 1; i <= totalPages; i++) {
                        pdf.setPage(i);

                        if (i > 1 && cachedLogoBase64) {
                            const logoWidth = 35;
                            const logoHeight = 8;
                            const logoX = (pageWidth - logoWidth) / 2;
                            pdf.addImage(cachedLogoBase64, 'PNG', logoX, 10, logoWidth, logoHeight); 
                        }

                        pdf.setFont("helvetica", "normal");
                        pdf.setFontSize(9);
                        pdf.setTextColor(150); 
                        pdf.text('gippslander.com.au', 10, pageHeight - 6);

                        const pageString = `Page ${i} of ${totalPages}`;
                        pdf.text(pageString, pageWidth - 25, pageHeight - 6);
                    }
                }).save().then(() => {
                    genBtn.innerText = currentText;
                    genBtn.disabled = false;
                });

            }, 300); 
        }
    </script>
</body>
</html>
